services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mira-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres
      POSTGRES_DB: mira_db

    ports:
      - "${POSTGRES_PORT:-5434}:5432"

    volumes:
      - mira_postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d mira_db"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mira_postgres_data:
    name: mira_postgres_data